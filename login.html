<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Dapper Essentials</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css" />
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js"
  }
}
</script>
<script type="module" src="firebase.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">DAPPER<span>.</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="caps.html">Caps</a></li>
    <li><a href="watches.html">Watches</a></li>
    <li><a href="wallets.html">Wallets</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="returns.html">Returns</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-nav" id="userNav"></div>
    <button class="cart-btn" id="cartBtn">Cart <span class="cart-count" id="cartCount">0</span></button>
  </div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="logo">DAPPER<span style="color:var(--gold)">.</span></a>
    <p class="auth-subtitle">Welcome back. Sign in to your account.</p>
    <div class="auth-form">
      <div class="auth-error" id="loginError"></div>
      <p style="text-align:center;color:var(--gray);font-size:0.9rem;margin-bottom:8px">Sign in with your Google account to continue.</p>
      <button class="google-btn" id="googleLoginBtn" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.54 10.54l7.97-6.2z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
    <p class="auth-footer-text">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header"><h2>Your Cart</h2><button class="close-cart" onclick="closeCart()">&times;</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty"><div class="empty-icon">&#x1F6CD;</div><p>Your cart is empty.<br>Start adding some essentials.</p></div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cartTotal">$0.00</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout &rarr;</button>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="closeProductDetail(event)">
  <div class="detail-panel">
    <button class="detail-close" onclick="closeProductDetail()">&times;</button>
    <div class="detail-layout">
      <div class="detail-gallery">
        <div class="detail-main-img-wrap"><img id="detailMainImg" src="" alt="" /></div>
        <div class="detail-thumbnails" id="detailThumbnails"></div>
      </div>
      <div class="detail-info">
        <div class="detail-category" id="detailCategory"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-price" id="detailPrice"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <div class="detail-options" id="detailOptions"></div>
        <div class="detail-add-row">
          <div class="detail-qty"><button onclick="detailQtyChange(-1)">&minus;</button><span id="detailQty">1</span><button onclick="detailQtyChange(1)">+</button></div>
          <button class="detail-add-btn" id="detailAddBtn" onclick="detailAddToCart()">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js" defer></script>
<script>
function handleGoogleLogin() {
  var errorEl = document.getElementById('loginError');
  var btn = document.getElementById('googleLoginBtn');
  errorEl.classList.remove('show');
  btn.disabled = true; btn.innerHTML = 'Signing in...';
  var params = new URLSearchParams(window.location.search);
  var redirect = params.get('redirect') || 'orders.html';
  signInWithGoogle()
    .then(function() { window.location.href = redirect; })
    .catch(function(err) {
      errorEl.textContent = err.message || 'Sign in failed. Try again.';
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.54 10.54l7.97-6.2z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Sign in with Google';
    });
}
</script>
</body>
</html>
