<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clear Firestore Data</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
body { font-family: Inter, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f0; }
.card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); text-align: center; max-width: 420px; }
h2 { font-family: 'Playfair Display', serif; margin-bottom: 8px; }
p { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
.btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; margin: 6px; }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-secondary { background: #ddd; color: #333; }
.btn-secondary:hover { background: #ccc; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.log { background: #f8f8f5; border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-top: 16px; font-size: 0.82rem; text-align: left; max-height: 200px; overflow-y: auto; color: #333; }
.log .done { color: #27ae60; }
.log .error { color: #c0392b; }
.log .info { color: #2980b9; }
.hidden { display: none; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card">
  <h2>Clear Firestore Data</h2>
  <p>This will delete all products and users from the Firestore database.</p>
  <button class="btn btn-danger" id="clearBtn" onclick="clearAll()">Delete Everything</button>
  <button class="btn btn-secondary" onclick="clearLocalOnly()">Clear localStorage Only</button>
  <div id="log" class="log hidden"></div>
</div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs } from "firebase/firestore";

const firebaseConfig = {
  apiKey: "AIzaSyAt0sK3XAxsJEjKJs7G_2gq43LJK8QaDj0",
  authDomain: "gentify-bbd67.firebaseapp.com",
  projectId: "gentify-bbd67",
  storageBucket: "gentify-bbd67.firebasestorage.app",
  messagingSenderId: "1099026087608",
  appId: "1:1099026087608:web:20649071afb1b84d48fe4d",
  measurementId: "G-45BDEVN7PH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.clearFirestore = async function() {
  var log = document.getElementById('log');
  log.classList.remove('hidden');
  log.innerHTML = '';
  var btn = document.getElementById('clearBtn');
  btn.disabled = true;

  function write(msg, cls) {
    log.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
  }

  write('Starting Firestore cleanup...', 'info');

  try {
    write('Deleting users collection...', 'info');
    var usersSnap = await getDocs(collection(db, "users"));
    var count = 0;
    for (var i = 0; i < usersSnap.docs.length; i++) {
      await deleteDoc(doc(db, "users", usersSnap.docs[i].id));
      count++;
    }
    write('Deleted ' + count + ' user document(s).', 'done');
  } catch (e) {
    write('Error deleting users: ' + e.message, 'error');
  }

  try {
    write('Clearing products catalog...', 'info');
    await setDoc(doc(db, "catalog", "products"), { data: {} });
    write('Products catalog cleared.', 'done');
  } catch (e) {
    write('Error clearing products: ' + e.message, 'error');
  }

  write('Firestore cleanup complete!', 'done');
  btn.disabled = false;
};

window.clearLocalStorage = function() {
  localStorage.removeItem('gentifyProducts');
  localStorage.removeItem('gentifyProductsTS');
  localStorage.removeItem('gentifyUsers');
  localStorage.removeItem('gentifyCurrentUser');
  localStorage.removeItem('gentifyCart');
  var log = document.getElementById('log');
  log.classList.remove('hidden');
  log.innerHTML = '<div class="done">localStorage cleared successfully.</div>';
};
</script>

<script>
function clearAll() {
  if (!confirm('Are you sure you want to DELETE ALL Firestore data? This cannot be undone!')) return;
  if (!confirm('REALLY? All products and users will be permanently deleted.')) return;
  window.clearFirestore();
  window.clearLocalStorage();
}
function clearLocalOnly() {
  window.clearLocalStorage();
}
</script>
