<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Track Order — Gentify Essentials</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css" />
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  }
}
</script>
<script type="module" src="firebase.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">GENTIFY<span>.</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="caps.html">Caps</a></li>
    <li><a href="watches.html">Watches</a></li>
    <li><a href="wallets.html">Wallets</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="returns.html">Returns</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-nav" id="userNav"></div>
    <button class="cart-btn" id="cartBtn">Cart <span class="cart-count" id="cartCount">0</span></button>
  </div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="track-page" id="trackPage">
  <div id="trackContent"></div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header"><h2>Your Cart</h2><button class="close-cart" onclick="closeCart()">&times;</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty"><div class="empty-icon">&#x1F6CD;</div><p>Your cart is empty.<br>Start adding some essentials.</p></div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cartTotal">$0.00</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout &rarr;</button>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="closeProductDetail(event)">
  <div class="detail-panel">
    <button class="detail-close" onclick="closeProductDetail()">&times;</button>
    <div class="detail-layout">
      <div class="detail-gallery">
        <div class="detail-main-img-wrap"><img id="detailMainImg" src="" alt="" /></div>
        <div class="detail-thumbnails" id="detailThumbnails"></div>
      </div>
      <div class="detail-info">
        <div class="detail-category" id="detailCategory"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-price" id="detailPrice"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <div class="detail-options" id="detailOptions"></div>
        <div class="detail-add-row">
          <div class="detail-qty"><button onclick="detailQtyChange(-1)">&minus;</button><span id="detailQty">1</span><button onclick="detailQtyChange(1)">+</button></div>
          <button class="detail-add-btn" id="detailAddBtn" onclick="detailAddToCart()">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js" defer></script>
<script>
function renderTracking() {
  const container = document.getElementById('trackContent');
  if (!container) return;
  const user = getCurrentUser();
  if (!user) {
    container.innerHTML = '<div class="orders-empty"><div class="empty-icon">&#x1F512;</div><h3>Sign in to track orders</h3><p>Please log in to view order tracking.</p><a href="login.html?redirect=track-order.html" class="hero-cta" style="display:inline-block">Sign In</a></div>';
    return;
  }
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  const order = getOrderById(orderId);
  if (!order) {
    container.innerHTML = '<div class="orders-empty"><div class="empty-icon">&#x1F50D;</div><h3>Order not found</h3><p>We couldn\'t find order ' + (orderId || '') + '.</p><a href="orders.html" class="hero-cta" style="display:inline-block">View All Orders</a></div>';
    return;
  }
  const stepNames = ['Ordered', 'Confirmed', 'Processed', 'Shipped', 'Delivered'];
  const stepIndex = order.status === 'delivered' ? 4 : order.status === 'shipped' ? 3 : order.status === 'processing' ? 2 : 1;
  const progressPct = (stepIndex / 4) * 100;

  container.innerHTML = `
    <h2>Track Order</h2>
    <p class="track-subtitle">${order.id} &middot; Placed on ${order.date}</p>
    <div class="track-progress">
      <div class="track-line-fill" style="width:${progressPct}%"></div>
      ${stepNames.map((name, i) => `
        <div class="track-step ${i < stepIndex ? 'completed' : i === stepIndex ? 'active' : ''}">
          <div class="step-dot">${i < stepIndex ? '\u2713' : i + 1}</div>
          <div class="step-label">${name}</div>
        </div>
      `).join('')}
    </div>
    <div class="track-details">
      <h3>Order Details</h3>
      <div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value">${order.id}</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:${order.status === 'delivered' ? '#2e7d32' : order.status === 'shipped' ? '#1565c0' : '#e65100'}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span></div>
      <div class="detail-row"><span class="detail-label">Tracking Number</span><span class="detail-value">${order.tracking}</span></div>
      <div class="detail-row"><span class="detail-label">Items</span><span class="detail-value">${order.items.length} item(s)</span></div>
      <div class="detail-row"><span class="detail-label">Total</span><span class="detail-value">$${order.total.toFixed(2)}</span></div>
      <div class="track-timeline">
        <h3 style="margin-top:16px">Timeline</h3>
        ${order.timeline.map((t, i) => `
          <div class="timeline-item ${i === order.timeline.length - 1 ? 'current' : ''}">
            <div class="tl-time">${t.time}</div>
            <div class="tl-text">${t.text}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', renderTracking);
</script>
</body>
</html>
